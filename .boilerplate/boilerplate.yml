# Terragrunt Boilerplate Configuration
variables:
  # Generic Boilerplate Variables Setup
  - name: is_hub
    order: 0
    description: "Is this a hub configuration?"
    type: bool
    default: false
  - name: tags
    order: 1
    description: "Tags"
    type: map
    default: {}
  # End - Generic Boilerplate Variables Setup
  - name: vpc_enabled
    order: 2
    description: "VPC dependency enabled for configuration."
    type: bool
    default: true
  - name: vpc_path
    order: 3
    description: "Path to VPC configuration, relative to the current configuration, required if vpc_enabled is true"
    type: string
    default: "../vpc"
  - name: subnet_type
    order: 4
    description: "Type of subnet configuration, required if vpc_enabled is true"
    type: enum
    default: "database"
    options:
      - "database"
      - "private"
      - "intra"
    
hooks:
  after:
    - command: "git"
      args: ["add", "."]
      dir: "{{ outputFolder }}"